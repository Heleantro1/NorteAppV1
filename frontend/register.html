<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cadastro - Norte Financeiro IA</title>
  <link rel="stylesheet" href="css/login.css" />
</head>
<body class="login-body">
  <div class="login-container">
    <div class="login-card">
      <h1>Norte Financeiro IA</h1>
      <p class="subtitle">Crie sua conta para acessar o painel</p>

      <form id="registerForm">
        <label for="nome">Nome</label>
        <input type="text" id="nome" placeholder="Seu nome" required />

        <label for="email">Email</label>
        <input type="email" id="email" placeholder="seuemail@exemplo.com" required />

        <label for="senha">Senha</label>
        <input type="password" id="senha" placeholder="Crie uma senha" required />

        <button type="submit">Cadastrar</button>
      </form>

      <p id="registerMensagem" class="mensagem"></p>

      <p class="extra-link">
        Já tem conta?
        <a href="index.html">Entrar</a>
      </p>
    </div>
  </div>

  <script src="js/register.js"></script>
</body>
</html>
