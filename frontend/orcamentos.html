<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orçamentos - Norte Financeiro IA</title>
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar">
      <div class="brand">
        <h1>Norte Financeiro IA</h1>
       
      </div>

      <nav class="menu">
        <a href="dashboard.html">Dashboard</a>
        <a href="transacoes.html">Transações</a>
        <a href="metas.html">Metas</a>
        <a href="orcamentos.html" class="active">Orçamentos</a>
        <a href="relatorios.html">Relatórios</a>
        <a href="insights.html">Insights IA</a>
      </nav>

      <button class="logout-btn" onclick="logout()">Sair</button>
    </aside>

    <main class="main-content">
      <header class="topbar">
        <div>
          <h2>Orçamentos Mensais</h2>
          <p>Defina limites por categoria e acompanhe seus gastos</p>
        </div>
      </header>

      <section class="panel form-panel">
        <div class="panel-header panel-header-inline">
          <h3 id="tituloFormularioOrcamento">Novo Orçamento</h3>
          <button type="button" class="secondary-btn" onclick="cancelarEdicaoOrcamento()" id="btnCancelarEdicaoOrcamento" style="display: none;">
            Cancelar edição
          </button>
        </div>

        <form id="orcamentoForm" class="form-grid">
          <input type="hidden" id="orcamentoId">

          <div class="form-group">
            <label for="categoria">Categoria</label>
            <input type="text" id="categoria" placeholder="Ex: Alimentação" required>
          </div>

          <div class="form-group">
            <label for="limite">Limite</label>
            <input type="number" id="limite" step="0.01" placeholder="0.00" required>
          </div>

          <div class="form-group">
            <label for="mes">Mês</label>
            <input type="number" id="mes" min="1" max="12" required>
          </div>

          <div class="form-group">
            <label for="ano">Ano</label>
            <input type="number" id="ano" min="2024" required>
          </div>

          <div class="form-actions">
            <button type="submit" class="primary-btn" id="btnSalvarOrcamento">Salvar Orçamento</button>
          </div>
        </form>

        <section class="feedback-box" id="orcamentoMensagem"></section>
      </section>

      <section class="panel">
        <div class="panel-header panel-header-inline">
          <h3>Meus Orçamentos</h3>
          <button class="secondary-btn" onclick="carregarOrcamentos()">Atualizar</button>
        </div>

        <div id="listaOrcamentos" class="orcamentos-grid">
          <p>Carregando orçamentos...</p>
        </div>
      </section>
    </main>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/orcamentos.js"></script>
  <script src="js/ui.js"></script>
</body>
</html>
