<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Insights IA - Norte Financeiro IA</title>
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar">
      <div class="brand">
        <h1>Norte Financeiro IA</h1>
      </div>

      <nav class="menu">
        <a href="dashboard.html">Dashboard</a>
        <a href="transacoes.html">Transações</a>
        <a href="metas.html">Metas</a>
        <a href="orcamentos.html">Orçamentos</a>
        <a href="relatorios.html">Relatórios</a>
        <a href="insights.html" class="active">Insights IA</a>
      </nav>

      <button class="logout-btn" onclick="logout()">Sair</button>
    </aside>

    <main class="main-content">
      <header class="topbar">
        <div>
          <h2>Insights IA</h2>
          <p>Receba análises inteligentes sobre sua vida financeira</p>
        </div>
      </header>

      <section class="panel form-panel">
        <div class="panel-header">
          <h3>Solicitar análise</h3>
        </div>

        <form id="insightsForm" class="form-grid">
          <div class="form-group">
            <label for="mes">Mês</label>
            <input type="number" id="mes" min="1" max="12" required>
          </div>

          <div class="form-group">
            <label for="ano">Ano</label>
            <input type="number" id="ano" min="2024" required>
          </div>

          <div class="form-group form-group-full">
            <label for="pergunta">Pergunta para a IA</label>
            <textarea id="pergunta" rows="5" placeholder="Ex: Analise meu mês, identifique excessos e me dê sugestões práticas."></textarea>
          </div>

          <div class="form-actions">
            <button type="submit" class="primary-btn">Gerar Insights</button>
          </div>
        </form>

        <section class="feedback-box" id="insightMensagem"></section>
      </section>

      <section class="panel">
        <div class="panel-header panel-header-inline">
          <h3>Resposta da IA</h3>
          <button class="secondary-btn" onclick="limparResposta()">Limpar</button>
        </div>

        <div id="insightResultado" class="insight-result">
          <p class="insight-placeholder">A análise da IA aparecerá aqui.</p>
        </div>
      </section>

      <section class="panel">
        <div class="panel-header">
          <h3>Sugestões de perguntas</h3>
        </div>

        <div class="suggestions-grid">
          <button class="suggestion-card" onclick="usarPergunta('Analise meu mês e destaque meus principais padrões de gasto.')">
            Analise meu mês e destaque meus principais padrões de gasto.
          </button>

          <button class="suggestion-card" onclick="usarPergunta('Quais despesas parecem excessivas e onde posso economizar?')">
            Quais despesas parecem excessivas e onde posso economizar?
          </button>

          <button class="suggestion-card" onclick="usarPergunta('Meu saldo e meus gastos estão saudáveis para este período?')">
            Meu saldo e meus gastos estão saudáveis para este período?
          </button>

          <button class="suggestion-card" onclick="usarPergunta('Com base no meu comportamento financeiro, quais seriam meus próximos passos mais inteligentes?')">
            Com base no meu comportamento financeiro, quais seriam meus próximos passos mais inteligentes?
          </button>
        </div>
      </section>
    </main>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/insights.js"></script>
  <script src="js/ui.js"></script>
</body>
</html>
